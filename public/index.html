<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lista De Filmes</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'neutral': {
              900: '#0e0e14',
              800: '#16161f',
              700: '#1e1e2a',
              600: '#252535',
              500: '#3a3a50',
              400: '#6b6b8a',
            },
            'indigo': { 600: '#7c5fcc', 500: '#a78bfa' },
            'green':  { 600: '#16a34a' },
            'red':    { 600: '#dc2626' },
            'sky':    { 600: '#0284c7' },
            'violet': { 500: '#a78bfa', 600: '#7c5fcc' }
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .modal-overlay { background: rgba(6,6,12,0.82); }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }

    /* Header com borda violeta sutil */
    header {
      border-bottom: 0.5px solid rgba(167,139,250,0.12);
      background: #0e0e14 !important;
      backdrop-filter: blur(12px);
      position: sticky !important;
      top: 0 !important;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 40 !important;
    }

    /* Sort divider */
    #sortFilters {
      border-top: 0.5px solid rgba(167,139,250,0.1) !important;
    }

    /* Modais com tema slate */
    #modalContent, #confirmDialog > div {
      background: #16161f !important;
      border: 0.5px solid rgba(167,139,250,0.18) !important;
    }

    /* Inputs dos modais */
    #modalStreaming, #modalPosterUrl, #modalSinopse,
    .bg-neutral-700 {
      background: #1e1e2a !important;
      border: 0.5px solid rgba(167,139,250,0.14) !important;
      color: #f0eeff !important;
    }
    #modalStreaming:focus, #modalPosterUrl:focus, #modalSinopse:focus {
      outline: none !important;
      border-color: rgba(167,139,250,0.5) !important;
    }

    /* Botão salvar — violeta */
    #btnSaveMovie {
      background: #7c5fcc !important;
    }
    #btnSaveMovie:hover { background: #a78bfa !important; }

    /* Botão adicionar (FAB) */
    #addMovieFab {
      background: linear-gradient(135deg, #a78bfa, #7c5fcc) !important;
      box-shadow: 0 4px 20px rgba(167,139,250,0.3) !important;
      border: none !important;
    }

    /* Scrollbar sutil */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0e0e14; }
    ::-webkit-scrollbar-thumb {
      background: rgba(167,139,250,0.2);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(167,139,250,0.4); }
  </style>
</head>

<body class="bg-neutral-900 text-white min-h-screen" style="background:#0e0e14 !important;color:#f0eeff">

  <header>
    <div class="px-4 py-4 md:p-6 flex flex-col gap-3 max-w-7xl mx-auto w-full">

    <!-- Linha 1: título + botões -->
    <div class="flex justify-between items-center w-full gap-2">
      <h1 class="text-2xl md:text-3xl font-bold flex-shrink-0" id="brand"
          style="background:linear-gradient(135deg,#f0eeff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
        Meus Filmes
      </h1>
      <div class="flex gap-1 md:gap-2 items-center flex-wrap justify-end">
        <button id="toggleLanguageBtn" type="button"
          class="lang-btn px-2 py-1 md:px-3 md:py-2 rounded flex-shrink-0 text-sm"
          style="background:#1e1e2a;border:0.5px solid rgba(167,139,250,0.18);color:#a78bfa;"
          aria-label="Mudar idioma">🇧🇷/🇺🇸</button>
        <button id="toggleSelectModeBtn" type="button"
          class="px-2 py-1 md:px-3 md:py-2 rounded flex-shrink-0 text-xs md:text-sm"
          style="background:#1e1e2a;border:0.5px solid rgba(167,139,250,0.18);color:#c4b5fd;"
          aria-label="Selecionar Vários">Selecionar</button>
        <button id="logoutBtn" type="button"
          class="px-2 py-1 md:px-3 md:py-2 rounded flex-shrink-0 text-xs md:text-sm"
          style="background:#dc2626;color:#fff;border:none;"
          aria-label="Sair">Sair</button>
      </div>
    </div>

    <!-- Linha 2: pesquisa -->
    <div class="w-full">
      <label for="searchInput" class="sr-only">Pesquisar filmes</label>
      <input id="searchInput" type="search"
        placeholder="Pesquisar título ou sinopse..."
        class="px-3 py-2 rounded w-full text-base md:text-lg" />
    </div>

    <!-- Linha 3: filtros de categoria -->
    <div id="categoryFilters" class="flex flex-wrap gap-2 items-center w-full"></div>

    <!-- Linha 4: ordenação -->
    <div id="sortFilters" class="flex flex-wrap gap-2 md:gap-3 items-center w-full pt-3">
      <span class="text-xs md:text-sm font-semibold" style="color:rgba(167,139,250,0.5);">Ordenar por:</span>
      <button id="sortByDateBtn"  data-sort="date"  class="filter-btn">Mais Recentes</button>
      <button id="sortByTitleBtn" data-sort="title" class="filter-btn">Título (A-Z)</button>
    </div>

    </div>
  </header>

  <main id="main" role="main" class="px-3 py-3 md:p-6">
    <div id="movieGrid"
      class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4"
      aria-live="polite"></div>
  </main>

  <!-- Modal principal -->
  <div id="modal"
    class="hidden fixed inset-0 modal-overlay flex items-center justify-center px-4 z-50"
    role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <div id="modalContent"
      class="w-full max-w-5xl rounded-xl p-4 md:p-6 relative overflow-y-auto max-h-[90vh]">
      <button id="closeModal" type="button"
        class="absolute top-4 right-4 hover:text-white"
        style="color:rgba(167,139,250,0.5);" aria-label="Fechar">✕</button>
      <div class="flex flex-col md:flex-row gap-6 lg:gap-8">
        <div class="md:w-1/3 flex-shrink-0">
          <img id="modalPoster" alt="Pôster do filme" class="w-full h-auto rounded-lg shadow-lg" />
          <div class="mt-4 edit-element">
            <label for="modalPosterUrl" class="block mb-1 text-sm" style="color:rgba(167,139,250,0.6);">URL do Pôster</label>
            <input id="modalPosterUrl" type="url" class="px-3 py-2 rounded w-full" placeholder="https://" />
          </div>
          <div class="flex gap-2 mt-4 edit-element-flex">
            <button id="modalFetchPoster"  class="px-3 py-1 rounded text-sm" style="background:#7c5fcc;color:#fff;">Buscar da API</button>
            <button id="modalUploadBtn"    class="px-3 py-1 rounded text-sm" style="background:#1e1e2a;color:#c4b5fd;border:0.5px solid rgba(167,139,250,0.2);">Upload</button>
            <input id="modalUploadInput" type="file" accept="image/*" class="hidden" />
            <button id="modalRemovePoster" class="px-3 py-1 rounded text-sm" style="background:#7f1d1d;color:#fca5a5;">Remover</button>
          </div>
        </div>
        <div class="md:w-2/3 flex flex-col">
          <h2 id="modalTitle" class="text-2xl md:text-3xl font-bold mb-2" style="color:#f0eeff;"></h2>
          <div id="modalCategories" class="flex flex-wrap gap-2 mb-4 view-element"></div>
          <div class="mb-4 edit-element">
            <label for="modalStreaming" class="block mb-1" style="color:rgba(167,139,250,0.6);">URL do Streaming</label>
            <input id="modalStreaming" type="url" class="px-3 py-2 rounded w-full" />
            <div class="flex items-center gap-2 mt-2">
              <input type="checkbox" id="rememberStreaming" />
              <label for="rememberStreaming" class="text-sm" style="color:rgba(240,238,255,0.5);">Lembrar preferência</label>
            </div>
          </div>
          <div class="mb-4">
            <label for="modalSinopse" class="block mb-2 font-semibold" style="color:rgba(167,139,250,0.7);">Sinopse</label>
            <textarea id="modalSinopse" class="w-full p-3 rounded min-h-32"></textarea>
            <div class="flex gap-2 mt-3 edit-element-flex">
              <button id="btnGerarSinopse"    type="button" class="px-3 py-2 rounded" style="background:#7c5fcc;color:#fff;">Gerar</button>
              <button id="btnLimparSinopse"   type="button" class="px-3 py-2 rounded" style="background:#1e1e2a;color:#c4b5fd;border:0.5px solid rgba(167,139,250,0.2);">Limpar</button>
              <button id="btnTranslateSinopse" type="button" class="px-3 py-2 rounded" style="background:#0284c7;color:#fff;">Traduzir (EN/PT)</button>
            </div>
          </div>
          <div class="mb-4 edit-element">
            <label class="block mb-2 font-semibold" style="color:rgba(167,139,250,0.7);">Categorias</label>
            <div id="modalCategorySelect" class="flex flex-wrap gap-2" aria-label="Seleção de categorias"></div>
          </div>
          <div class="flex justify-between mt-auto edit-element">
            <button id="btnDeleteMovie" type="button" class="px-4 py-2 rounded" style="background:#dc2626;color:#fff;">Excluir</button>
            <button id="btnSaveMovie"   type="button" class="px-4 py-2 rounded" style="background:#7c5fcc;color:#fff;">Salvar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de confirmação -->
  <div id="confirmDialog"
    class="hidden fixed inset-0 modal-overlay flex items-center justify-center px-4 z-[999999]"
    role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="w-full max-w-sm rounded-xl p-6 relative shadow-2xl"
         style="background:#16161f;border:0.5px solid rgba(167,139,250,0.2);">
      <h3 id="confirmTitle"   class="text-xl font-bold mb-4" style="color:#f0eeff;">Confirmação</h3>
      <p  id="confirmMessage" class="mb-6" style="color:rgba(240,238,255,0.5);">Deseja realmente excluir?</p>
      <div class="flex justify-end gap-3">
        <button id="confirmCancelBtn" type="button" class="px-4 py-2 rounded"
          style="background:#1e1e2a;color:#c4b5fd;border:0.5px solid rgba(167,139,250,0.2);">Cancelar</button>
        <button id="confirmOKBtn"     type="button" class="px-4 py-2 rounded"
          style="background:#dc2626;color:#fff;">Excluir</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="js/addMovies.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>

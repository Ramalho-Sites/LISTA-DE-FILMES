<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — RamalhoFlix</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #0e0e14;
      --surface:    #16161f;
      --surface2:   #1e1e2a;
      --violet:     #a78bfa;
      --violet-dim: #7c5fcc;
      --violet-glow: rgba(167,139,250,0.12);
      --text:       #f0eeff;
      --muted:      rgba(240,238,255,0.45);
      --border:     rgba(167,139,250,0.14);
      --border-focus: rgba(167,139,250,0.5);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    #webCanvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── CARD ── */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: rgba(22,22,31,0.85);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.7s ease-out forwards;
      opacity: 0;
      transform: translateY(24px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-logo {
      font-size: 36px;
      display: block;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── INPUTS ── */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.6);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--border-focus);
      background: rgba(167,139,250,0.06);
    }

    .field input::placeholder { color: rgba(255,255,255,0.2); }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 44px;
    }

    #togglePassword {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      transition: color 0.2s;
    }
    #togglePassword:hover { color: var(--violet); }

    /* ── BOTÕES ── */
    .btn-main {
      width: 100%;
      background: linear-gradient(135deg, #a78bfa, #7c5fcc);
      border: none;
      border-radius: 12px;
      padding: 13px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-main:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-main:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: rgba(255,255,255,0.15);
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(255,255,255,0.08);
    }

    .btn-google {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-google:hover:not(:disabled) {
      border-color: var(--border-focus);
      background: var(--violet-glow);
    }
    .btn-google:disabled { opacity: 0.45; cursor: not-allowed; }

    .google-icon { width: 16px; height: 16px; }

    /* ── FORGOT ── */
    .forgot {
      text-align: center;
      margin-top: 18px;
    }

    #forgotPasswordLink {
      font-size: 12px;
      color: rgba(167,139,250,0.5);
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: inherit;
    }
    #forgotPasswordLink:hover { color: var(--violet); }

    /* ── BACK LINK ── */
    .back-link {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--muted); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      top: 20px; right: 20px;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .toast-success { background: #22c55e; }
    .toast-error   { background: #ef4444; }
    .toast-warning { background: #f59e0b; }
    .toast-info    { background: #a78bfa; }
  </style>
</head>
<body>

<canvas id="webCanvas"></canvas>

<div class="page">
  <div class="login-card">
    <div class="card-header">
      <span class="card-logo">🎬</span>
      <div class="card-title">RamalhoFlix</div>
      <div class="card-sub">Entre ou crie sua conta para continuar</div>
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="••••••••" required />
        <button type="button" id="togglePassword" title="Mostrar/ocultar senha">
          <i class="fas fa-eye" id="toggleIcon"></i>
        </button>
      </div>
    </div>

    <button id="loginBtn" class="btn-main">Entrar / Criar Conta</button>

    <div class="divider">ou</div>

    <button id="googleBtn" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>

    <div class="forgot">
      <button id="forgotPasswordLink">Esqueci minha senha</button>
    </div>
  </div>

  <a href="landing.html" class="back-link">← Voltar para a página inicial</a>
</div>

<div id="toast" class="toast"></div>

<script>
const canvas = document.getElementById('webCanvas');
const ctx = canvas.getContext('2d');
let W, H, t = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const cx = W * 0.5, cy = H * 0.35;
  const maxR = Math.max(W, H) * 0.8;
  const rings = 8, spokes = 16;

  for (let r = 1; r <= rings; r++) {
    const radius = (maxR / rings) * r;
    const alpha = (0.05 - r * 0.004) + Math.sin(t + r) * 0.006;
    ctx.beginPath();
    for (let s = 0; s <= spokes; s++) {
      const angle = (s / spokes) * Math.PI * 2 - Math.PI / 2;
      const jitter = 1 + Math.sin(s * 2.3 + r * 1.7 + t * 0.25) * 0.04;
      const x = cx + Math.cos(angle) * radius * jitter;
      const y = cy + Math.sin(angle) * radius * jitter;
      s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(167,139,250,${Math.max(0.01, alpha)})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  for (let s = 0; s < spokes; s++) {
    const angle = (s / spokes) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
    ctx.strokeStyle = 'rgba(167,139,250,0.045)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  for (let s = 0; s < spokes; s++) {
    const angle = (s / spokes) * Math.PI * 2 - Math.PI / 2;
    for (let r = 1; r <= rings; r++) {
      const radius = (maxR / rings) * r;
      const jitter = 1 + Math.sin(s * 2.3 + r * 1.7 + t * 0.25) * 0.04;
      const x = cx + Math.cos(angle) * radius * jitter;
      const y = cy + Math.sin(angle) * radius * jitter;
      const pulse = 0.3 + Math.sin(t * 1.2 + s + r) * 0.25;
      ctx.beginPath();
      ctx.arc(x, y, r === 1 ? 2 : 1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(167,139,250,${pulse * 0.45})`;
      ctx.fill();
    }
  }

  const cp = 0.6 + Math.sin(t * 1.5) * 0.3;
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(167,139,250,${cp})`;
  ctx.fill();

  t += 0.008;
  requestAnimationFrame(draw);
}

resize();
draw();
window.addEventListener('resize', resize);

const togglePassword = document.getElementById("togglePassword");
const passwordInput  = document.getElementById("password");
const toggleIcon     = document.getElementById("toggleIcon");
togglePassword.addEventListener("click", () => {
  const isHidden = passwordInput.type === "password";
  passwordInput.type = isHidden ? "text" : "password";
  toggleIcon.className = isHidden ? "fas fa-eye-slash" : "fas fa-eye";
});
</script>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
